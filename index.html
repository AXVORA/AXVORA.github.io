<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXVORA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#fff;
    color:#111;
}

.hero{
    height:70vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
    padding:20px;
}

.logo{
    font-size:42px;
    letter-spacing:8px;
    font-weight:600;
}

.hero h2{
    margin-top:15px;
    font-size:40px;
}

.hero p{
    margin-top:15px;
    color:#777;
    font-size:18px;
}

.btn{
    margin-top:35px;
    display:inline-block;
    text-decoration:none;
    background:#111;
    color:#fff;
    padding:14px 38px;
    border-radius:40px;
}

.products{
    max-width:1200px;
    margin:auto;
    padding:80px 20px;
}

.products h2{
    text-align:center;
    margin-bottom:50px;
    letter-spacing:2px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:30px;
}

.card{
    border:1px solid #eee;
    border-radius:18px;
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 30px rgba(0,0,0,.08);
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
}

.info{
    padding:20px;
}

.info h3{
    font-size:20px;
    margin-bottom:10px;
}

.price{
    font-size:24px;
    font-weight:600;
}

.view{
    display:block;
    width:max-content;
    margin:60px auto;
    color:#111;
    text-decoration:none;
    border-bottom:1px solid #111;
    padding-bottom:4px;
}

footer{
    border-top:1px solid #eee;
    padding:35px;
    text-align:center;
    color:#777;
}

</style>

</head>

<body>

<section class="hero">

<div class="logo">AXVORA</div>

<h2>Luxury Accessories</h2>

<p>Minimal. Timeless. Premium.</p>

<a href="#" class="btn">Shop Now</a>

</section>

<section class="products">

<h2>FEATURED PRODUCTS</h2>

<div class="grid">

<div class="card">
    <img src="images/bracelet.jpg" alt="Premium Bracelet">

    <div class="info">
        <h3>Premium Bracelet</h3>

        <div class="price">₹399</div>
    </div>
</div>

<div class="card">
<img src="images/chain.jpg" alt="Chain">
<div class="info">
<h3>Silver Chain</h3>
<div class="price">₹499</div>
</div>
</div>

<div class="card">
<img src="images/ring.jpg" alt="Ring">
<div class="info">
<h3>Premium Ring</h3>
<div class="price">₹299</div>
</div>
</div>

</div>

<a href="shop.html" class="view">View All →</a>

</section>

<footer>

© 2026 AXVORA

</footer>

</body>
</html>
